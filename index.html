<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LURKE — See who quietly unfollowed you</title>
<meta name="description" content="Tap below to reveal them.">
<style>
  :root{
    --surface:#2f2952;
    --surface-2:#393166;
    --border:rgba(255,255,255,0.28);
    --primary:#ec6b7a;
    --primary-hover:#e2566a;
    --primary-grad:linear-gradient(135deg,#ec6b7a,#f08a6e);
    --text:#f4f1fa;
    --text-muted:#a39ec0;
    --status-unfollow:#ff5d6c;
    --status-ghost:#f5a623;
    --status-positive:#46d6a0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{
    background:#08060f;
    height:100%;
  }
  body{
    min-height:100vh;
    min-height:100svh;
    background:linear-gradient(to bottom,#2d1f45 0%,#221c3a 18%,#160f2e 42%,#0c0820 68%,#08060f 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* page column */
  .page{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    padding:clamp(24px,5vh,44px) 20px max(24px,env(safe-area-inset-bottom));
  }

  /* eyebrow */
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    font-weight:700;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--primary);
    background:rgba(236,107,122,0.12);
    border:2px solid rgba(236,107,122,0.75);
    padding:5px 11px;
    border-radius:999px;
    align-self:center;
  }
  .live-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--status-positive);
    flex-shrink:0;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:.4;transform:scale(.75);}
  }
  @media(prefers-reduced-motion:reduce){.live-dot{animation:none;}}

  /* hero text */
  h1{
    font-size:clamp(1.45rem,6vw,1.85rem);
    font-weight:800;
    letter-spacing:-0.02em;
    text-align:center;
    line-height:1.18;
  }
  .subhead{
    font-size:13.5px;
    color:var(--text-muted);
    text-align:center;
    line-height:1.4;
  }

  /* notification cards */
  .notif-cards{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .notif-card{
    display:flex;
    align-items:center;
    gap:11px;
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:15px;
    padding:11px 13px;
  }
  .lock{
    margin-left:auto;
    font-size:16px;
    flex-shrink:0;
    line-height:1;
  }
  .avatar{
    flex:0 0 auto;
    width:38px;
    height:38px;
    border-radius:50%;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .notif-text{
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
    flex:1;
  }
  .handle{
    font-size:14px;
    font-weight:700;
    color:var(--text);
    filter:blur(5px);
    user-select:none;
    pointer-events:none;
  }
  .status-label{font-size:12px;font-weight:500;}

  /* bottom section */
  .bottom{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:0;
  }
  .cta-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    min-height:52px;
    background:var(--primary-grad);
    color:#fff;
    font-size:17px;
    font-weight:700;
    border:none;
    border-radius:16px;
    padding:14px 16px;
    cursor:pointer;
    box-shadow:none;
    -webkit-tap-highlight-color:transparent;
    text-decoration:none;
  }
  .cta-btn:active{background:var(--primary-hover);box-shadow:none;}

  /* footer */
  .footer-tagline{
    margin-top:14px;
    text-align:center;
    font-size:11px;
    font-weight:400;
    color:rgba(163,158,192,0.42);
    letter-spacing:.01em;
  }
</style>
</head>
<body>
